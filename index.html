<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>排班表｜七休一自動排班·員工預設休假·自動記憶</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
            transition: background 0.2s, color 0.2s;
        }

        .app-container {
            max-width: 98vw;
            margin: 0 auto;
            background: transparent;
            border-radius: 28px;
            padding: 1rem 1rem 2rem 1rem;
        }

        .theme-card {
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: 0 12px 28px var(--shadow-color);
            transition: all 0.2s;
            padding: 0 0 1.2rem 0;
            overflow-x: auto;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--toolbar-bg);
            border-bottom: 1px solid var(--border-color);
            border-radius: 28px 28px 0 0;
        }

        .left-group, .right-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        button, .theme-btn {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            padding: 6px 14px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            color: var(--btn-text);
        }

        button.primary {
            background: var(--primary-bg);
            border-color: var(--primary-border);
            color: white;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(0.96);
        }

        .date-range {
            background: var(--range-bg);
            padding: 5px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-color);
        }

        .zoom-control {
            display: flex;
            gap: 5px;
            align-items: center;
            background: var(--toolbar-bg);
            padding: 3px 10px;
            border-radius: 40px;
        }

        .zoom-value {
            min-width: 50px;
            text-align: center;
            font-weight: bold;
        }

        .table-frozen-container {
            position: relative;
            overflow: auto;
            max-height: 70vh;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin: 16px 20px 10px 20px;
            background: var(--table-bg);
        }

        .schedule-table {
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 800px;
            width: 100%;
        }

        .schedule-table th, .schedule-table td {
            border: 1px solid var(--border-color);
            padding: 8px 6px;
            text-align: center;
            vertical-align: middle;
        }

        .schedule-table th {
            background: var(--header-bg);
            color: var(--header-text);
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(2px);
        }

        .staff-col {
            background: var(--staff-col-bg);
            font-weight: 700;
            position: sticky;
            left: 0;
            z-index: 15;
            background-color: var(--staff-col-bg);
            border-right: 2px solid var(--border-color);
        }

        .holiday-mark {
            background-color: var(--holiday-bg) !important;
        }

        .check-holiday {
            transform: scale(1.1);
            margin-right: 4px;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .violation-warning {
            background-color: var(--violation-bg);
            box-shadow: inset 0 0 0 1px var(--violation-border);
        }

        .violation-icon {
            display: inline-block;
            background: #d9534f;
            color: white;
            font-size: 9px;
            width: 15px;
            height: 15px;
            line-height: 15px;
            border-radius: 50%;
            margin-left: 6px;
            cursor: help;
        }

        .shift-badge {
            font-size: 0.7rem;
            font-weight: 600;
            background: var(--badge-bg);
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 4px;
            display: inline-block;
        }

        .footer-note {
            padding: 12px 20px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            color: var(--text-light);
            border-top: 1px solid var(--border-color);
            margin-top: 12px;
        }

        /* 主題變數 - 預設清新藍 */
        :root {
            --card-bg: #ffffff;
            --toolbar-bg: #f8fafc;
            --border-color: #dce5ec;
            --btn-bg: #ffffff;
            --btn-border: #cbd5e1;
            --btn-text: #1e4663;
            --primary-bg: #2c7da0;
            --primary-border: #2c7da0;
            --range-bg: #eef2fa;
            --text-color: #1e2a3e;
            --header-bg: #2c3e50;
            --header-text: white;
            --staff-col-bg: #f0f4f9;
            --holiday-bg: #ffe8e6;
            --violation-bg: #ffe1df;
            --violation-border: #e0817a;
            --badge-bg: #eef2f7;
            --text-light: #4a627a;
            --accent-color: #e05a5a;
            --shadow-color: rgba(0,0,0,0.08);
            --table-bg: white;
        }

        body.theme-warm {
            --card-bg: #fef7e8;
            --toolbar-bg: #fff3e0;
            --border-color: #f0dbb4;
            --btn-bg: #fffaf2;
            --btn-border: #e7cba5;
            --btn-text: #7a5800;
            --primary-bg: #e67e22;
            --primary-border: #d35400;
            --range-bg: #fae6ce;
            --text-color: #4a331c;
            --header-bg: #b45f2b;
            --header-text: #fff3e0;
            --staff-col-bg: #fff2e4;
            --holiday-bg: #ffded3;
            --violation-bg: #fbd9cd;
            --violation-border: #e67e22;
            --badge-bg: #f8e5cf;
            --text-light: #8b6946;
            --shadow-color: rgba(100, 60, 10, 0.1);
        }

        body.theme-green {
            --card-bg: #eef5ea;
            --toolbar-bg: #e2f0da;
            --border-color: #c5ddb5;
            --btn-bg: #f4faf0;
            --btn-border: #bdd6a8;
            --btn-text: #2d5a2c;
            --primary-bg: #2e7d32;
            --primary-border: #1b5e20;
            --range-bg: #d9ebcd;
            --text-color: #1d3e1d;
            --header-bg: #2e6738;
            --header-text: white;
            --staff-col-bg: #eaf5e3;
            --holiday-bg: #fff0dd;
            --violation-bg: #ffe0d4;
            --violation-border: #c96f3e;
            --badge-bg: #e2f0da;
            --text-light: #4d6e3b;
            --shadow-color: rgba(40, 70, 20, 0.08);
        }

        body.theme-dark {
            background: #1a1e2c;
            --card-bg: #232838;
            --toolbar-bg: #2a2f3f;
            --border-color: #3e4a5c;
            --btn-bg: #2f3548;
            --btn-border: #4a5568;
            --btn-text: #cfdee9;
            --primary-bg: #4f7e9e;
            --primary-border: #5d8db0;
            --range-bg: #2a3548;
            --text-color: #eef2fb;
            --header-bg: #1f2a3e;
            --header-text: #e0edff;
            --staff-col-bg: #2d3447;
            --holiday-bg: #4c2f2f;
            --violation-bg: #5e3735;
            --violation-border: #b97c6b;
            --badge-bg: #2f3a48;
            --text-light: #a3bbd4;
            --accent-color: #d97c6e;
            --shadow-color: rgba(0,0,0,0.4);
            --table-bg: #1e2436;
        }

        .theme-selector {
            display: flex;
            gap: 8px;
        }
        .theme-btn {
            font-size: 0.7rem;
            padding: 4px 10px;
        }
        input, select {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            padding: 6px 10px;
            border-radius: 24px;
            color: var(--btn-text);
        }
        label {
            font-size: 0.75rem;
            font-weight: 500;
        }
        .memory-note {
            background: var(--badge-bg);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="theme-card">
        <div class="toolbar">
            <div class="left-group">
                <button id="prevPeriodBtn">◀ 上個週期</button>
                <button id="nextPeriodBtn">下個週期 ▶</button>
                <div style="display: flex; gap:6px; align-items:center;">
                    <label>自訂週期:</label>
                    <input type="date" id="startDatePicker">
                    <span>～</span>
                    <input type="date" id="endDatePicker">
                    <button id="applyCustomRangeBtn" class="primary">套用</button>
                </div>
                <button id="resetToDefaultCycleBtn">重置本月25週期</button>
                <button id="clearAllHolidaysBtn" style="background:#f0c0c0;">🗑️ 清除休假</button>
                <button id="applyPresetBtn" style="background:#c0e0c0;">📅 套用員工預設休假</button>
            </div>
            <div class="right-group">
                <div class="zoom-control">
                    <button id="zoomOutBtn">−</button>
                    <span class="zoom-value" id="zoomPercent">100%</span>
                    <button id="zoomInBtn">+</button>
                    <button id="zoomResetBtn">↺</button>
                </div>
                <div class="theme-selector">
                    <button class="theme-btn" data-theme="default">🌊 清新藍</button>
                    <button class="theme-btn" data-theme="warm">☀️ 暖橘</button>
                    <button class="theme-btn" data-theme="green">🌿 森林綠</button>
                    <button class="theme-btn" data-theme="dark">🌙 暗夜</button>
                </div>
                <div class="date-range" id="rangeDisplay"></div>
                <div class="memory-note" title="所有週期、休假及主題都會自動儲存在瀏覽器中">💾 自動記憶</div>
            </div>
        </div>

        <div class="table-frozen-container" id="tableScrollArea">
            <table class="schedule-table" id="scheduleTable">
                <thead id="tableHeader"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="footer-note">
            <span>📌 七休一原則：自動排班並標示違規( ! )，勾選「休」後立即重新分配值班。</span>
            <span>⚡ 預設休假：阮龍明(六日)、陳建宏(日一)、許文育(四日)、吳耀東(六一) — 點擊上方按鈕套用</span>
        </div>
    </div>
</div>

<script>
    // ---------- 六人姓名 (索引對應) ----------
    const STAFF_NAMES = ["許文育", "張吉誠", "阮龍明", "吳耀東", "陳建宏", "鄭宇淞"];
    const STAFF_COUNT = 6;
    
    // 全域狀態
    let currentDateRange = [];     // Date[]
    let currentDateStrs = [];      // YYYY-MM-DD[]
    let holidaysMap = {};          // { dateStr: boolean[] }
    let currentAssignments = {};
    let violationsMap = {};
    let currentTheme = "default";
    
    // ---------- localStorage 存取 ----------
    const STORAGE_KEY = "ShiftScheduleMemoryV2";
    
    function saveToLocalStorage() {
        const state = {
            version: "2.1",
            dateRangeStrs: currentDateStrs,
            holidaysMap: holidaysMap,
            theme: currentTheme,
            lastStartStr: currentDateRange.length ? toYMD(currentDateRange[0]) : null,
            lastEndStr: currentDateRange.length ? toYMD(currentDateRange[currentDateRange.length-1]) : null
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    
    function loadFromLocalStorage() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return null;
        try {
            return JSON.parse(raw);
        } catch(e) { return null; }
    }
    
    function applyTheme(themeName) {
        currentTheme = themeName;
        document.body.classList.remove('theme-warm','theme-green','theme-dark');
        if(themeName === 'warm') document.body.classList.add('theme-warm');
        else if(themeName === 'green') document.body.classList.add('theme-green');
        else if(themeName === 'dark') document.body.classList.add('theme-dark');
        else document.body.classList.remove('theme-warm','theme-green','theme-dark');
    }
    
    // 七休一排班核心
    function autoAssignShifts() {
        const days = currentDateStrs;
        if (!days.length) return;
        let assignment = {};
        let workDaysPerStaff = Array(STAFF_COUNT).fill().map(()=>[]);
        
        function wouldViolate(staffIdx, dayIdx) {
            let targetDate = currentDateRange[dayIdx];
            let cnt=0;
            for(let i=1;i<=6;i++) {
                let prev = new Date(targetDate);
                prev.setDate(targetDate.getDate()-i);
                let prevStr = toYMD(prev);
                if(assignment[prevStr] === staffIdx) cnt++;
            }
            return cnt >= 6;
        }
        
        for(let i=0;i<days.length;i++) {
            let dStr = days[i];
            let holidayArr = holidaysMap[dStr] || new Array(STAFF_COUNT).fill(false);
            let candidates = [];
            for(let s=0;s<STAFF_COUNT;s++) {
                if(!holidayArr[s]) candidates.push(s);
            }
            if(candidates.length===0) {
                assignment[dStr] = 0;
                workDaysPerStaff[0].push(i);
                continue;
            }
            let legal = candidates.filter(s=>!wouldViolate(s,i));
            let selected;
            if(legal.length>0) {
                let loads = legal.map(s=>workDaysPerStaff[s].length);
                let minLoad = Math.min(...loads);
                let best = legal.filter((_,idx)=>loads[idx]===minLoad);
                selected = best[Math.floor(Math.random()*best.length)];
            } else {
                selected = candidates[0];
            }
            assignment[dStr] = selected;
            workDaysPerStaff[selected].push(i);
        }
        currentAssignments = assignment;
        
        let violation = {};
        for(let i=0;i<days.length;i++) {
            let dStr = days[i];
            let staff = assignment[dStr];
            if(staff===undefined) continue;
            let cons=1;
            for(let step=1;step<=6;step++) {
                let prevDate = new Date(currentDateRange[i]);
                prevDate.setDate(prevDate.getDate()-step);
                let prevStr = toYMD(prevDate);
                if(assignment[prevStr] === staff) cons++;
                else break;
            }
            violation[dStr] = cons > 6;
        }
        violationsMap = violation;
    }
    
    function toggleHoliday(dateStr, staffIdx, isChecked) {
        if(!holidaysMap[dateStr]) holidaysMap[dateStr] = new Array(STAFF_COUNT).fill(false);
        holidaysMap[dateStr][staffIdx] = isChecked;
        autoAssignShifts();
        renderTable();
        saveToLocalStorage();
    }
    
    function clearAllHolidays() {
        for(let i=0;i<currentDateStrs.length;i++) {
            let dStr = currentDateStrs[i];
            if(!holidaysMap[dStr]) holidaysMap[dStr] = new Array(STAFF_COUNT).fill(false);
            for(let s=0;s<STAFF_COUNT;s++) holidaysMap[dStr][s]=false;
        }
        autoAssignShifts();
        renderTable();
        saveToLocalStorage();
    }
    
    // ---------- 套用員工預設休假 (依據星期規則) ----------
    // 員工索引: 0許文育, 1張吉誠(無), 2阮龍明, 3吳耀東, 4陳建宏, 5鄭宇淞(無)
    // 規則:
    // 阮龍明(2): 星期六(6) 、星期日(0)
    // 陳建宏(4): 星期日(0)、星期一(1)
    // 許文育(0): 星期四(4)、星期日(0)
    // 吳耀東(3): 星期六(6)、星期一(1)
    function applyPresetHolidays() {
        // 遍歷當前週期每一天
        for(let i=0;i<currentDateStrs.length;i++) {
            let dStr = currentDateStrs[i];
            let dateObj = currentDateRange[i];
            let weekday = dateObj.getDay(); // 0周日 ~ 6周六
            if(!holidaysMap[dStr]) holidaysMap[dStr] = new Array(STAFF_COUNT).fill(false);
            
            // 阮龍明 (索引2) : 週六(6) 或 週日(0)
            if(weekday === 6 || weekday === 0) {
                holidaysMap[dStr][2] = true;
            }
            // 陳建宏 (索引4) : 週日(0) 或 週一(1)
            if(weekday === 0 || weekday === 1) {
                holidaysMap[dStr][4] = true;
            }
            // 許文育 (索引0) : 週四(4) 或 週日(0)
            if(weekday === 4 || weekday === 0) {
                holidaysMap[dStr][0] = true;
            }
            // 吳耀東 (索引3) : 週六(6) 或 週一(1)
            if(weekday === 6 || weekday === 1) {
                holidaysMap[dStr][3] = true;
            }
            // 其餘員工不強制變更，保持原狀 (不清空)
        }
        autoAssignShifts();
        renderTable();
        saveToLocalStorage();
    }
    
    // 設定日期範圍
    function setDateRange(startDate, endDate, keepHolidays=false) {
        let range = [];
        let cur = new Date(startDate);
        while(cur <= endDate) {
            range.push(new Date(cur));
            cur.setDate(cur.getDate()+1);
        }
        currentDateRange = range;
        currentDateStrs = range.map(d=>toYMD(d));
        
        if(!keepHolidays) {
            let newMap = {};
            for(let i=0;i<currentDateStrs.length;i++) {
                newMap[currentDateStrs[i]] = new Array(STAFF_COUNT).fill(false);
            }
            holidaysMap = newMap;
        } else {
            let filtered={};
            for(let i=0;i<currentDateStrs.length;i++) {
                let ds=currentDateStrs[i];
                if(holidaysMap[ds]) filtered[ds]=[...holidaysMap[ds]];
                else filtered[ds]=new Array(STAFF_COUNT).fill(false);
            }
            holidaysMap=filtered;
        }
        autoAssignShifts();
        renderTable();
        let startStr = `${startDate.getFullYear()}/${startDate.getMonth()+1}/${startDate.getDate()}`;
        let endStr = `${endDate.getFullYear()}/${endDate.getMonth()+1}/${endDate.getDate()}`;
        document.getElementById('rangeDisplay').innerHTML = `${startStr} ～ ${endStr}`;
        saveToLocalStorage();
        
        document.getElementById('startDatePicker').value = toYMD(startDate);
        document.getElementById('endDatePicker').value = toYMD(endDate);
    }
    
    function getDefaultPeriod() {
        let today = new Date();
        let yr = today.getFullYear(), mon = today.getMonth(), day = today.getDate();
        let start = new Date(yr, mon, 25);
        if(day < 25) start = new Date(yr, mon-1, 25);
        let end = new Date(start);
        end.setMonth(end.getMonth()+1);
        end.setDate(25);
        return {start, end};
    }
    
    function resetToDefaultCycle() {
        let {start, end} = getDefaultPeriod();
        setDateRange(start, end, false);
    }
    
    // 渲染表格 (凍結表頭+姓名)
    function renderTable() {
        const thead = document.getElementById('tableHeader');
        const tbody = document.getElementById('tableBody');
        if(!thead || !tbody) return;
        let headerRow = document.createElement('tr');
        let thName = document.createElement('th');
        thName.innerText = '姓名 \\ 日期';
        thName.style.minWidth = '90px';
        headerRow.appendChild(thName);
        for(let idx=0; idx<currentDateStrs.length; idx++) {
            let d = currentDateRange[idx];
            let monthDay = `${d.getMonth()+1}/${d.getDate()}`;
            let week = ['日','一','二','三','四','五','六'][d.getDay()];
            let th = document.createElement('th');
            th.innerHTML = `${monthDay}<br><span style="font-size:0.7rem;">(${week})</span>`;
            headerRow.appendChild(th);
        }
        thead.innerHTML = '';
        thead.appendChild(headerRow);
        tbody.innerHTML = '';
        
        for(let s=0; s<STAFF_COUNT; s++) {
            let tr = document.createElement('tr');
            let tdStaff = document.createElement('td');
            tdStaff.innerText = STAFF_NAMES[s];
            tdStaff.classList.add('staff-col');
            tr.appendChild(tdStaff);
            
            for(let dIdx=0; dIdx<currentDateStrs.length; dIdx++) {
                let dStr = currentDateStrs[dIdx];
                let isHoliday = (holidaysMap[dStr] && holidaysMap[dStr][s]) || false;
                let dutyStaff = currentAssignments[dStr];
                let isOnDuty = (dutyStaff === s);
                let isViolation = (violationsMap[dStr] === true && isOnDuty && !isHoliday);
                
                let td = document.createElement('td');
                if(isHoliday) td.classList.add('holiday-mark');
                if(isViolation) td.classList.add('violation-warning');
                
                let chkLabel = document.createElement('label');
                let chk = document.createElement('input');
                chk.type = 'checkbox';
                chk.checked = isHoliday;
                chk.classList.add('check-holiday');
                chk.addEventListener('change', (function(date, staffIdx, checkedVal){
                    return function(e){
                        toggleHoliday(date, staffIdx, e.target.checked);
                    };
                })(dStr, s, chk.checked));
                chkLabel.appendChild(chk);
                chkLabel.appendChild(document.createTextNode('休'));
                td.appendChild(chkLabel);
                
                let statusSpan = document.createElement('div');
                statusSpan.style.marginTop = '4px';
                if(isOnDuty && !isHoliday) statusSpan.innerHTML = `<span class="shift-badge">🟢 值班</span>`;
                else if(isOnDuty && isHoliday) statusSpan.innerHTML = `<span class="shift-badge" style="background:#ffe0b5;">⚠️ 衝突</span>`;
                else if(!isOnDuty && !isHoliday) statusSpan.innerHTML = `<span class="shift-badge">⚪ 休息</span>`;
                else if(isHoliday) statusSpan.innerHTML = `<span class="shift-badge" style="background:#ffccc7;">🔴 休假</span>`;
                td.appendChild(statusSpan);
                
                if(isViolation) {
                    let warn = document.createElement('span');
                    warn.className = 'violation-icon';
                    warn.innerText = '!';
                    warn.title = '違反七休一：連續工作超過6天';
                    td.appendChild(warn);
                }
                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        }
        // 每日休假小計
        let totalRow = document.createElement('tr');
        let tdLabel = document.createElement('td');
        tdLabel.innerText = '每日休假人數';
        tdLabel.style.background = 'var(--staff-col-bg)';
        tdLabel.style.fontWeight = 'bold';
        totalRow.appendChild(tdLabel);
        for(let i=0;i<currentDateStrs.length;i++) {
            let ds = currentDateStrs[i];
            let arr = holidaysMap[ds] || new Array(STAFF_COUNT).fill(false);
            let cnt = arr.filter(v=>v===true).length;
            let tdCnt = document.createElement('td');
            tdCnt.innerText = cnt;
            tdCnt.style.background = 'var(--badge-bg)';
            totalRow.appendChild(tdCnt);
        }
        tbody.appendChild(totalRow);
    }
    
    function applyCustomRange() {
        let startStr = document.getElementById('startDatePicker').value;
        let endStr = document.getElementById('endDatePicker').value;
        if(!startStr || !endStr) { alert('請填寫起迄日期'); return; }
        let startDate = new Date(startStr);
        let endDate = new Date(endStr);
        if(startDate > endDate) { alert('起始日不得晚於結束日'); return; }
        setDateRange(startDate, endDate, false);
    }
    
    function prevPeriod() {
        if(currentDateRange.length===0) return;
        let firstDay = new Date(currentDateRange[0]);
        firstDay.setDate(firstDay.getDate()-1);
        let newStart = new Date(firstDay);
        newStart.setDate(25);
        let newEnd = new Date(newStart);
        newEnd.setMonth(newEnd.getMonth()+1);
        newEnd.setDate(25);
        setDateRange(newStart, newEnd, true);
    }
    function nextPeriod() {
        if(currentDateRange.length===0) return;
        let lastDay = new Date(currentDateRange[currentDateRange.length-1]);
        let nextStart = new Date(lastDay);
        nextStart.setDate(26);
        nextStart = new Date(nextStart.getFullYear(), nextStart.getMonth(), 25);
        let newEnd = new Date(nextStart);
        newEnd.setMonth(newEnd.getMonth()+1);
        newEnd.setDate(25);
        setDateRange(nextStart, newEnd, true);
    }
    
    // 縮放
    let currentZoom = 1;
    const scrollArea = document.getElementById('tableScrollArea');
    function applyZoom() { scrollArea.style.transform = `scale(${currentZoom})`; scrollArea.style.transformOrigin = 'top left'; document.getElementById('zoomPercent').innerText = `${Math.round(currentZoom*100)}%`; }
    function zoomIn() { if(currentZoom<1.8){ currentZoom+=0.1; applyZoom(); } }
    function zoomOut() { if(currentZoom>0.5){ currentZoom-=0.1; applyZoom(); } }
    function zoomReset() { currentZoom=1; applyZoom(); }
    
    function toYMD(date) {
        let y = date.getFullYear();
        let m = String(date.getMonth()+1).padStart(2,'0');
        let d = String(date.getDate()).padStart(2,'0');
        return `${y}-${m}-${d}`;
    }
    
    // 初始化：讀取儲存或預設週期
    function initFromMemoryOrNew() {
        const saved = loadFromLocalStorage();
        if(saved && saved.dateRangeStrs && saved.dateRangeStrs.length>0 && saved.holidaysMap) {
            let startDate = saved.dateRangeStrs[0] ? new Date(saved.dateRangeStrs[0]) : null;
            let endDate = saved.dateRangeStrs[saved.dateRangeStrs.length-1] ? new Date(saved.dateRangeStrs[saved.dateRangeStrs.length-1]) : null;
            if(startDate && endDate && !isNaN(startDate) && !isNaN(endDate)) {
                let range = [];
                let cur = new Date(startDate);
                while(cur <= endDate) {
                    range.push(new Date(cur));
                    cur.setDate(cur.getDate()+1);
                }
                currentDateRange = range;
                currentDateStrs = range.map(d=>toYMD(d));
                let restoredMap = {};
                for(let ds of currentDateStrs) {
                    if(saved.holidaysMap[ds] && saved.holidaysMap[ds].length === STAFF_COUNT) {
                        restoredMap[ds] = [...saved.holidaysMap[ds]];
                    } else {
                        restoredMap[ds] = new Array(STAFF_COUNT).fill(false);
                    }
                }
                holidaysMap = restoredMap;
                autoAssignShifts();
                renderTable();
                let startStr = `${startDate.getFullYear()}/${startDate.getMonth()+1}/${startDate.getDate()}`;
                let endStr = `${endDate.getFullYear()}/${endDate.getMonth()+1}/${endDate.getDate()}`;
                document.getElementById('rangeDisplay').innerHTML = `${startStr} ～ ${endStr}`;
                document.getElementById('startDatePicker').value = toYMD(startDate);
                document.getElementById('endDatePicker').value = toYMD(endDate);
                if(saved.theme) applyTheme(saved.theme);
                else applyTheme("default");
                saveToLocalStorage();
                return;
            }
        }
        let {start, end} = getDefaultPeriod();
        setDateRange(start, end, false);
        applyTheme("default");
    }
    
    // 綁定事件
    document.getElementById('prevPeriodBtn').addEventListener('click', prevPeriod);
    document.getElementById('nextPeriodBtn').addEventListener('click', nextPeriod);
    document.getElementById('resetToDefaultCycleBtn').addEventListener('click', resetToDefaultCycle);
    document.getElementById('applyCustomRangeBtn').addEventListener('click', applyCustomRange);
    document.getElementById('clearAllHolidaysBtn').addEventListener('click', clearAllHolidays);
    document.getElementById('applyPresetBtn').addEventListener('click', () => {
        if(confirm('套用員工預設休假 (阮龍明六日、陳建宏日一、許文育四日、吳耀東六一)？\n注意：會將當前週期內符合規則的日期設為休假，其他員工休假不受影響，但會覆蓋同日期同員工的現有設定。')) {
            applyPresetHolidays();
        }
    });
    document.getElementById('zoomInBtn').addEventListener('click', zoomIn);
    document.getElementById('zoomOutBtn').addEventListener('click', zoomOut);
    document.getElementById('zoomResetBtn').addEventListener('click', zoomReset);
    document.querySelectorAll('.theme-btn').forEach(btn=>{
        btn.addEventListener('click', (e)=>{
            let theme = btn.getAttribute('data-theme');
            applyTheme(theme);
            saveToLocalStorage();
        });
    });
    
    initFromMemoryOrNew();
    applyZoom();
</script>
</body>
</html>
